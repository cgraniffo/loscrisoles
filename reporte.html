
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte Diario — Los Crisoles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f4f0; color: #1a1a1a; padding: 16px; }
    .wrap { max-width: 680px; margin: 0 auto; }
    .header { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
    .counter { background: #fee2e2; color: #991b1b; font-size: 26px; font-weight: bold; width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-text .title { font-size: 16px; font-weight: bold; }
    .header-text .sub { font-size: 13px; color: #666; margin-top: 3px; }
    .legend { font-size: 12px; color: #555; margin-bottom: 14px; display: flex; gap: 16px; flex-wrap: wrap; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .section-label { font-size: 11px; font-weight: bold; color: #888; letter-spacing: 0.05em; text-transform: uppercase; margin: 0 0 8px; }
    .section-gap { margin-top: 18px; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .card-head { padding: 9px 14px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-head-proceso { background: #fef9ec; }
    .card-head-pendiente { background: #f8f8f6; }
    .card-head .name { font-size: 14px; font-weight: bold; }
    .card-head .cc { font-size: 12px; color: #888; margin-top: 2px; }
    .badge { font-size: 11px; padding: 2px 10px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
    .badge-proceso { background: #fef3c7; color: #92400e; }
    .badge-pendiente { background: #f0f0ee; color: #555; border: 1px solid #ddd; }
    .labor-row { padding: 9px 14px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-start; gap: 10px; }
    .labor-row:last-child { border-bottom: none; }
    .labor-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .labor-fecha { font-size: 12px; font-weight: bold; width: 80px; flex-shrink: 0; }
    .labor-nombre { font-size: 14px; color: #1a1a1a; }
    .labor-obs { font-size: 12px; color: #888; margin-top: 2px; }
    .footer { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; margin-top: 16px; font-size: 13px; color: #666; }
    .empty { text-align: center; color: #aaa; font-size: 14px; padding: 32px; }
    .loading { text-align: center; color: #888; font-size: 14px; padding: 40px; }
    .error-box { background: #fff8f8; border: 1px solid #fca5a5; border-radius: 8px; padding: 16px; color: #991b1b; font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
<div class="wrap">
  <div id="app"><div class="loading">Cargando reporte...</div></div>
</div>
<script>
const API_REGISTRO = "https://script.google.com/macros/s/AKfycbwmWfb90F9JEc7peFqTU3WgeKXx9fG21JzfIWgKsWaiARti7ds1_TBtQzjTzVraliNg/exec";
const API_CC       = "https://script.google.com/macros/s/AKfycby2FLw2eD7uP_xpKVMaDYt940MoPabyDV1PD0dvHimjfLKt8IJ-tDFFZaakFQtvBgkL/exec";

async function fetchSheet(sheet) {
  const url = sheet === "BD_CC" ? API_CC : API_REGISTRO;
  const res = await fetch(url + "?sheet=" + sheet, { redirect: "follow" });
  if (!res.ok) throw new Error("Error HTTP " + res.status + " al leer " + sheet);
  return res.json();
}

function getTodayStr() {
  return new Date().toISOString().split("T")[0];
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { fecha: p.get("fecha") || getTodayStr() };
}

function parseDate(val) {
  if (!val) return null;
  const s = String(val).trim();
  // ISO con zona horaria: 2026-03-12T07:00:00.000Z — tomar solo la parte de fecha UTC
  if (/^\d{4}-\d{2}-\d{2}T/.test(s)) {
    const [y, m, d] = s.split("T")[0].split("-");
    return new Date(+y, +m - 1, +d);
  }
  // DD-MM-YYYY o DD/MM/YYYY
  if (/^\d{2}[-\/]\d{2}[-\/]\d{4}$/.test(s)) {
    const sep = s.includes("-") ? "-" : "/";
    const [d, m, y] = s.split(sep);
    return new Date(+y, +m - 1, +d);
  }
  // YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [y, m, d] = s.split("-");
    return new Date(+y, +m - 1, +d);
  }
  return null;
}

function formatFecha(val) {
  const d = parseDate(val);
  if (!d || isNaN(d)) return String(val);
  return d.toLocaleDateString("es-CL", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function fechaColor(val) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = parseDate(val);
  if (!d || isNaN(d)) return { color: "#166534", bg: "#86efac" };
  d.setHours(0,0,0,0);
  if (d < today) return { color: "#cc2222", bg: "#fca5a5" };
  if (d.getTime() === today.getTime()) return { color: "#b45309", bg: "#fcd34d" };
  return { color: "#166534", bg: "#86efac" };
}

function formatDisplayDate(str) {
  const d = new Date(str + "T12:00:00");
  if (isNaN(d)) return str;
  return d.toLocaleDateString("es-CL", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}

function renderCard(cc, labores, tipo) {
  const isProc = tipo === "En Proceso";
  const filas = labores.map(r => {
    const fc = fechaColor(r["Fecha"]);
    const obs = String(r["Observaciones"] || "").trim();
    const labor = String(r["Labor"] || "—").trim();
    return `<div class="labor-row">
      <div class="labor-dot" style="background:${fc.bg};border:1.5px solid ${fc.color};margin-top:4px;width:9px;height:9px;border-radius:50%;flex-shrink:0;"></div>
      <div class="labor-fecha" style="color:${fc.color};">${formatFecha(r["Fecha"])}</div>
      <div>
        <div class="labor-nombre">${labor}</div>
        ${obs ? `<div class="labor-obs">${obs}</div>` : ""}
      </div>
    </div>`;
  }).join("");

  const fundo   = String(cc["FUNDO"]   || cc["Fundo"]   || "").trim();
  const especie = String(cc["Especie"] || "").trim();
  const sector  = String(cc["Sector"]  || "").trim();
  const sub = [fundo, especie, sector ? "Sector " + sector : ""].filter(Boolean).join(" · ");

  return `<div class="card">
    <div class="card-head ${isProc ? "card-head-proceso" : "card-head-pendiente"}">
      <div>
        <div class="name">${String(cc["NOMBRE CC"] || cc["Id_CC"] || "").trim()}</div>
        <div class="cc">${sub}</div>
      </div>
      <span class="badge ${isProc ? "badge-proceso" : "badge-pendiente"}">${isProc ? "En proceso" : "Pendiente"}</span>
    </div>
    ${filas}
  </div>`;
}

async function render() {
  const app = document.getElementById("app");
  try {
    const [registros, ccs] = await Promise.all([
      fetchSheet("BD_Registro"),
      fetchSheet("BD_CC")
    ]);

    const activos = registros.filter(r => {
      const est = String(r["Estado Operativo"] || "").trim();
      return est === "En Proceso" || est === "Pendiente";
    });

    const enProceso = activos.filter(r => String(r["Estado Operativo"]).trim() === "En Proceso");
    const pendientes = activos.filter(r => String(r["Estado Operativo"]).trim() === "Pendiente");
    const total = activos.length;
    const params = getParams();

    const seccion = (lista, tipo) => {
      let html = "";
      ccs.forEach(cc => {
        const id = String(cc["Id_CC"] || "").trim();
        const labs = lista.filter(r => String(r["Centro_Costo"] || "").trim() === id);
        if (labs.length > 0) {
          const sorted = [...labs].sort((a, b) => {
            const da = parseDate(a["Fecha"]), db = parseDate(b["Fecha"]);
            return (da || 0) - (db || 0);
          });
          html += renderCard(cc, sorted, tipo);
        }
      });
      return html;
    };

    const htmlProceso   = seccion(enProceso, "En Proceso");
    const htmlPendiente = seccion(pendientes, "Pendiente");

    app.innerHTML = `
      <div class="header">
        <div class="counter">${total}</div>
        <div class="header-text">
          <div class="title">Los Crisoles — Reporte diario</div>
          <div class="sub">${total} labores activas · ${formatDisplayDate(params.fecha)}</div>
        </div>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:#fca5a5;border:1.5px solid #cc2222;"></span>Vencida</span>
        <span><span class="dot" style="background:#fcd34d;border:1.5px solid #b45309;"></span>Vence hoy</span>
        <span><span class="dot" style="background:#86efac;border:1.5px solid #166534;"></span>Próxima</span>
      </div>
      ${htmlProceso   ? `<div class="section-label">🔄 En proceso (${enProceso.length})</div>${htmlProceso}` : ""}
      ${htmlPendiente ? `<div class="section-label section-gap">📌 Pendientes (${pendientes.length})</div>${htmlPendiente}` : ""}
      ${total === 0   ? '<div class="empty">✅ Sin labores activas por hoy</div>' : ""}
      <div class="footer">
        Entrá a la app → pestaña <strong>Pendientes</strong> → completá el detalle → cambiá el estado a <strong>Completo</strong>
      </div>`;

  } catch(e) {
    app.innerHTML = `<div class="error-box">
      <strong>No se pudieron cargar los datos</strong><br><br>
      ${e.message}<br><br>
      <small>Abrí la consola del navegador (F12 → Console) y pegá el error acá para ayudarte a diagnosticarlo.</small>
    </div>`;
  }
}

render();
</script>
</body>
</html>
