<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte Diario — Los Crisoles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0ede6; color: #1a1a1a; }
    .hdr { background: #1a3a0a; color: #fff; padding: 18px 20px 0; }
    .hdr-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .hdr-logo { font-size: 10px; font-weight: bold; letter-spacing: 0.1em; color: #86efac; text-transform: uppercase; margin-bottom: 4px; }
    .hdr-title { font-size: 20px; font-weight: bold; color: #fff; }
    .hdr-date { font-size: 12px; color: #9fe1cb; margin-top: 3px; }
    .hdr-refresh { font-size: 11px; color: #9fe1cb; text-align: right; }
    .metrics-top { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 0; }
    .m { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; }
    .m-val { font-size: 26px; font-weight: bold; color: #fff; line-height: 1; }
    .m-val.red { color: #fca5a5; } .m-val.amber { color: #fcd34d; } .m-val.green { color: #86efac; }
    .m-label { font-size: 11px; color: #9fe1cb; margin-top: 4px; }

    /* TABS */
    .tabs { display: flex; gap: 0; margin-top: 16px; }
    .tab { padding: 10px 22px; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 8px 8px 0 0; color: #9fe1cb; background: rgba(255,255,255,0.08); margin-right: 4px; }
    .tab.on { background: #f0ede6; color: #1a3a0a; }

    .body { padding: 16px; max-width: 900px; margin: 0 auto; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .stat-card { background: #fff; border-radius: 10px; border: 1px solid #e5e2da; padding: 14px 16px; }
    .stat-title { font-size: 11px; font-weight: bold; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label { font-size: 12px; color: #444; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-wrap { flex: 1; background: #f0ede6; border-radius: 4px; height: 8px; }
    .bar-fill { height: 8px; border-radius: 4px; }
    .bar-num { font-size: 12px; font-weight: bold; color: #444; width: 24px; text-align: right; flex-shrink: 0; }
    .bar-num-wide { font-size: 11px; font-weight: bold; color: #444; width: 80px; text-align: right; flex-shrink: 0; }
    .rank-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f5f3ef; }
    .rank-row:last-child { border-bottom: none; }
    .rank-num { font-size: 13px; font-weight: bold; color: #ccc; width: 20px; flex-shrink: 0; }
    .rank-name { font-size: 12px; color: #1a1a1a; flex: 1; line-height: 1.4; }
    .rank-val { font-size: 13px; font-weight: bold; color: #cc2222; }
    .atraso-big { font-size: 36px; font-weight: bold; color: #cc2222; line-height: 1; }
    .atraso-sub { font-size: 12px; color: #888; margin-top: 4px; margin-bottom: 12px; }
    .atraso-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f5f3ef; font-size: 12px; }
    .atraso-row:last-child { border-bottom: none; }
    .filters-wrap { background: #fff; border-radius: 10px; border: 1px solid #e5e2da; padding: 12px 14px; margin-bottom: 14px; }
    .filters-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
    .filters-row:last-child { margin-bottom: 0; }
    .filter-label { font-size: 11px; color: #888; width: 80px; flex-shrink: 0; }
    .fbtn { font-size: 11px; padding: 4px 12px; border-radius: 99px; border: 1px solid #ddd; background: #f8f8f6; color: #555; cursor: pointer; }
    .fbtn.on { background: #1a3a0a; color: #fff; border-color: #1a3a0a; }
    .sec-head { display: flex; align-items: center; gap: 8px; margin: 16px 0 10px; }
    .sec-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; flex-shrink: 0; }
    .sec-icon.proc { background: #fef3c7; color: #92400e; } .sec-icon.pend { background: #e5e2da; color: #555; }
    .sec-title { font-size: 12px; font-weight: bold; color: #555; letter-spacing: 0.05em; text-transform: uppercase; }
    .sec-count { font-size: 12px; color: #aaa; }
    .card { background: #fff; border-radius: 10px; margin-bottom: 10px; overflow: hidden; border: 1px solid #e5e2da; }
    .card-hd { padding: 10px 14px; border-bottom: 1px solid #f0ede6; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-hd.proc { background: #fefdf7; } .card-hd.pend { background: #fafaf8; }
    .card-hd-name { font-size: 14px; font-weight: bold; color: #1a1a1a; }
    .card-hd-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
    .badge { font-size: 10px; padding: 2px 9px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
    .badge.proc { background: #fef3c7; color: #92400e; } .badge.pend { background: #f0f0ee; color: #666; border: 1px solid #ddd; }
    .labor { display: flex; border-bottom: 1px solid #f5f3ef; }
    .labor:last-child { border-bottom: none; }
    .labor-bar { width: 3px; flex-shrink: 0; }
    .labor-inner { display: flex; gap: 10px; padding: 9px 14px; flex: 1; align-items: flex-start; }
    .labor-date { font-size: 11px; font-weight: bold; width: 72px; flex-shrink: 0; padding-top: 1px; }
    .labor-name { font-size: 13px; font-weight: bold; color: #1a1a1a; }
    .labor-obs { font-size: 11px; color: #888; margin-top: 2px; line-height: 1.4; }
    .labor-meta { font-size: 10px; color: #bbb; margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
    .empty { text-align: center; color: #aaa; font-size: 14px; padding: 40px 20px; background: #fff; border-radius: 10px; border: 1px solid #e5e2da; }
    .loading { text-align: center; color: #666; font-size: 14px; padding: 60px 20px; }
    .err { background: #fff8f8; border: 1px solid #fca5a5; border-radius: 10px; padding: 16px; color: #991b1b; font-size: 13px; line-height: 1.6; margin-top: 16px; }
    .footer { background: #fff; border-radius: 10px; border: 1px solid #e5e2da; padding: 12px 16px; margin-top: 16px; font-size: 12px; color: #888; text-align: center; }

    /* COSTOS */
    .costo-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .cm { background: #fff; border-radius: 10px; border: 1px solid #e5e2da; padding: 14px 16px; }
    .cm-val { font-size: 22px; font-weight: bold; color: #1a3a0a; line-height: 1; }
    .cm-label { font-size: 11px; color: #888; margin-top: 4px; }
    .mes-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f3ef; }
    .mes-row:last-child { border-bottom: none; }
    .mes-label { font-size: 13px; color: #1a1a1a; width: 100px; flex-shrink: 0; }
    .mes-bar-wrap { flex: 1; background: #f0ede6; border-radius: 4px; height: 10px; }
    .mes-bar-fill { height: 10px; border-radius: 4px; background: #1a3a0a; }
    .mes-val { font-size: 12px; font-weight: bold; color: #1a3a0a; width: 90px; text-align: right; flex-shrink: 0; }
    .up-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .up-table th { text-align: left; font-size: 11px; color: #888; font-weight: bold; letter-spacing: 0.05em; text-transform: uppercase; padding: 6px 8px; border-bottom: 2px solid #f0ede6; }
    .up-table td { padding: 8px 8px; border-bottom: 1px solid #f5f3ef; vertical-align: middle; }
    .up-table tr:last-child td { border-bottom: none; }
    .up-table tr:hover td { background: #fafaf8; }
    .tipo-pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; margin: 2px; }
  </style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-logo">Los Crisoles · BData</div>
      <div class="hdr-title">Reporte diario Los Crisoles</div>
      <div class="hdr-date" id="hdr-date">—</div>
    </div>
    <div class="hdr-refresh" id="hdr-refresh"></div>
  </div>
  <div class="metrics-top" id="metrics-labores">
    <div class="m"><div class="m-val" id="m-total">—</div><div class="m-label">Total activas</div></div>
    <div class="m"><div class="m-val red" id="m-venc">—</div><div class="m-label">Vencidas</div></div>
    <div class="m"><div class="m-val amber" id="m-hoy">—</div><div class="m-label">Vencen hoy</div></div>
    <div class="m"><div class="m-val green" id="m-prox">—</div><div class="m-label">Próximas</div></div>
  </div>
  <div class="metrics-top" id="metrics-costos" style="display:none;">
    <div class="m"><div class="m-val green" id="m-costo-total">—</div><div class="m-label">Costo total acumulado</div></div>
    <div class="m"><div class="m-val" id="m-costo-ha">—</div><div class="m-label">Costo por hectárea</div></div>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab-labores" onclick="switchTab('labores')">📋 Labores</div>
    <div class="tab" id="tab-costos" onclick="switchTab('costos')">💰 Costos</div>
  </div>
</div>

<div class="body">
  <div id="app-labores"><div class="loading">Cargando reporte...</div></div>
  <div id="app-costos" style="display:none;"><div class="loading">Cargando costos...</div></div>
</div>

<script>
const API_REGISTRO = "https://script.google.com/macros/s/AKfycbwmWfb90F9JEc7peFqTU3WgeKXx9fG21JzfIWgKsWaiARti7ds1_TBtQzjTzVraliNg/exec";
const API_CC       = "https://script.google.com/macros/s/AKfycby2FLw2eD7uP_xpKVMaDYt940MoPabyDV1PD0dvHimjfLKt8IJ-tDFFZaakFQtvBgkL/exec";
const API_LABORES  = "https://script.google.com/macros/s/AKfycbzTk-xJWAsbT_OFMagD9OcYGjSpOM6tP6fDEkIaz9O28IQ4Ydb8EL0_GpgOrl5D0-vF/exec";

const CC_MAP = {}, FUNDO_MAP = {}, LAB_MAP = {}, ENC_MAP = {}, HA_MAP = {};
let ACTIVOS = [], TODOS = [];
let state = { estado:"todas", encargado:"todos", up:"todas", soloVencidas:false };
let stateCostos = { cc:"todas", fundo:"todos", anio:"todos", mes:"todos" };
let currentTab = "labores";

async function fetchSheet(apiUrl, sheet) {
  const res = await fetch(apiUrl + "?sheet=" + sheet, { redirect:"follow" });
  if (!res.ok) throw new Error("HTTP " + res.status + " — " + sheet);
  return res.json();
}

function parseDate(val) {
  if (!val) return null;
  const s = String(val).trim();
  try {
    if (/^\d{4}-\d{2}-\d{2}T/.test(s)) { const [y,m,d]=s.split("T")[0].split("-"); return new Date(+y,+m-1,+d); }
    if (/^\d{2}[-\/]\d{2}[-\/]\d{4}$/.test(s)) { const sep=s.includes("-")?"-":"/"; const [d,m,y]=s.split(sep); return new Date(+y,+m-1,+d); }
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) { const [y,m,d]=s.split("-"); return new Date(+y,+m-1,+d); }
  } catch(e) {}
  return null;
}
function today0() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function dateStatus(val) {
  const t=today0(), d=parseDate(val);
  if (!d||isNaN(d)) return "prox";
  d.setHours(0,0,0,0);
  if (d<t) return "venc";
  if (d.getTime()===t.getTime()) return "hoy";
  return "prox";
}
function diffDays(val) {
  const t=today0(), d=parseDate(val);
  if (!d||isNaN(d)) return 0;
  d.setHours(0,0,0,0);
  return Math.max(0, Math.round((t-d)/86400000));
}
function fmtDate(val) {
  const d=parseDate(val);
  if (!d||isNaN(d)) return String(val||"");
  return d.toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function fmtMes(val) {
  const d=parseDate(val);
  if (!d||isNaN(d)) return "—";
  return d.toLocaleDateString("es-CL",{month:"short",year:"numeric"});
}
function fmtPeso(n) {
  return "$" + Math.round(n).toLocaleString("es-CL");
}

const C = { venc:{bar:"#fca5a5",date:"#cc2222"}, hoy:{bar:"#fcd34d",date:"#b45309"}, prox:{bar:"#86efac",date:"#166534"} };

function switchTab(tab) {
  currentTab = tab;
  document.getElementById("tab-labores").className = "tab" + (tab==="labores"?" on":"");
  document.getElementById("tab-costos").className  = "tab" + (tab==="costos"?" on":"");
  document.getElementById("app-labores").style.display    = tab==="labores" ? "" : "none";
  document.getElementById("app-costos").style.display     = tab==="costos"  ? "" : "none";
  document.getElementById("metrics-labores").style.display = tab==="labores" ? "" : "none";
  document.getElementById("metrics-costos").style.display  = tab==="costos"  ? "" : "none";
}

function countBy(arr, keyFn) {
  const m={};
  arr.forEach(r=>{ const v=keyFn(r)||"—"; m[v]=(m[v]||0)+1; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function sumBy(arr, keyFn, valFn) {
  const m={};
  arr.forEach(r=>{ const k=keyFn(r)||"—"; m[k]=(m[k]||0)+(valFn(r)||0); });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function bar(label, val, max, color, fmtFn) {
  const pct = max>0 ? Math.round(val/max*100) : 0;
  const fmt = fmtFn ? fmtFn(val) : val;
  return `<div class="bar-row">
    <div class="bar-label" title="${label}">${label}</div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
    <div class="bar-num-wide">${fmt}</div>
  </div>`;
}

// ── RENDER LABORES ─────────────────────────────────────────────────────────
function renderStats() {
  const encRows = countBy(ACTIVOS, r=>ENC_MAP[String(r["Encargado"]||"").trim()]||String(r["Encargado"]||"—").trim());
  const encMax  = encRows[0]?.[1]||1;
  const encHTML = encRows.slice(0,6).map(([k,v])=>bar(k,v,encMax,"#2d6a1a",null)).join("");

  const upRows = countBy(ACTIVOS, r=>CC_MAP[String(r["Centro_Costo"]||"").trim()]||String(r["Centro_Costo"]||"—").trim());
  const upMax  = upRows[0]?.[1]||1;
  const upHTML = upRows.slice(0,6).map(([k,v])=>bar(k,v,upMax,"#0f6e56",null)).join("");

  const tipoRows = countBy(ACTIVOS, r=>String(r["Tipo_Labor"]||"—").trim());
  const tipoMax  = tipoRows[0]?.[1]||1;
  const tipoHTML = tipoRows.slice(0,6).map(([k,v])=>bar(k,v,tipoMax,"#b45309",null)).join("");

  const vencidas  = ACTIVOS.filter(r=>dateStatus(r["Fecha"])==="venc");
  const totalDias = vencidas.reduce((s,r)=>s+diffDays(r["Fecha"]),0);
  const promDias  = vencidas.length>0 ? Math.round(totalDias/vencidas.length) : 0;
  const maxDias   = vencidas.length>0 ? Math.max(...vencidas.map(r=>diffDays(r["Fecha"]))) : 0;
  const topVenc   = [...vencidas].sort((a,b)=>diffDays(b["Fecha"])-diffDays(a["Fecha"])).slice(0,4);
  const topHTML   = topVenc.map((r,i)=>`
    <div class="rank-row">
      <div class="rank-num">${i+1}</div>
      <div class="rank-name">${LAB_MAP[String(r["Labor"]||"").trim()]||String(r["Labor"]||"—").trim()}<br>
        <span style="font-size:10px;color:#aaa;">${CC_MAP[String(r["Centro_Costo"]||"").trim()]||String(r["Centro_Costo"]||"").trim()}</span>
      </div>
      <div class="rank-val">${diffDays(r["Fecha"])}d</div>
    </div>`).join("");

  return `<div class="stats-grid">
    <div class="stat-card"><div class="stat-title">Labores por encargado</div>${encHTML||"<div style='font-size:12px;color:#aaa;'>Sin datos</div>"}</div>
    <div class="stat-card"><div class="stat-title">Labores por unidad productiva</div>${upHTML||"<div style='font-size:12px;color:#aaa;'>Sin datos</div>"}</div>
    <div class="stat-card"><div class="stat-title">Labores por tipo</div>${tipoHTML||"<div style='font-size:12px;color:#aaa;'>Sin datos</div>"}</div>
    <div class="stat-card">
      <div class="stat-title">Días de atraso</div>
      <div class="atraso-big">${promDias}</div>
      <div class="atraso-sub">promedio · máximo ${maxDias} días</div>
      <div class="atraso-row"><span>Labores vencidas</span><b>${vencidas.length}</b></div>
      <div class="atraso-row"><span>Total días acumulados</span><b>${totalDias}</b></div>
      <div style="margin-top:12px;font-size:11px;font-weight:bold;color:#888;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;">Top más atrasadas</div>
      ${topHTML}
    </div>
  </div>`;
}

function renderFilters() {
  const encargados = [...new Set(ACTIVOS.map(r=>{
    const id=String(r["Encargado"]||"").trim(); return ENC_MAP[id]||id;
  }).filter(Boolean))].sort();
  const ups = [...new Set(ACTIVOS.map(r=>String(r["Centro_Costo"]||"").trim()).filter(Boolean))].sort();
  const encBtns = encargados.map(e=>`<button class="fbtn${state.encargado===e?" on":""}" onclick="setFilter('encargado','${e}')">${e}</button>`).join("");
  const upBtns  = ups.map(id=>`<button class="fbtn${state.up===id?" on":""}" onclick="setFilter('up','${id}')">${CC_MAP[id]||id}</button>`).join("");
  return `<div class="filters-wrap">
    <div class="filters-row">
      <div class="filter-label">Estado</div>
      <button class="fbtn${state.estado==="todas"?" on":""}" onclick="setFilter('estado','todas')">Todas</button>
      <button class="fbtn${state.estado==="En Proceso"?" on":""}" onclick="setFilter('estado','En Proceso')">En proceso</button>
      <button class="fbtn${state.estado==="Pendiente"?" on":""}" onclick="setFilter('estado','Pendiente')">Pendiente</button>
      <button class="fbtn${state.soloVencidas?" on":""}" onclick="toggleVencidas()">Solo vencidas</button>
    </div>
    <div class="filters-row">
      <div class="filter-label">Encargado</div>
      <button class="fbtn${state.encargado==="todos"?" on":""}" onclick="setFilter('encargado','todos')">Todos</button>
      ${encBtns}
    </div>
    <div class="filters-row">
      <div class="filter-label">Unidad prod.</div>
      <button class="fbtn${state.up==="todas"?" on":""}" onclick="setFilter('up','todas')">Todas</button>
      ${upBtns}
    </div>
  </div>`;
}

function applyFilters() {
  return ACTIVOS.filter(r=>{
    const est = String(r["Estado Operativo"]||"").trim();
    const enc = ENC_MAP[String(r["Encargado"]||"").trim()]||String(r["Encargado"]||"").trim();
    const up  = String(r["Centro_Costo"]||"").trim();
    if (state.estado!=="todas" && est!==state.estado) return false;
    if (state.encargado!=="todos" && enc!==state.encargado) return false;
    if (state.up!=="todas" && up!==state.up) return false;
    if (state.soloVencidas && dateStatus(r["Fecha"])!=="venc") return false;
    return true;
  });
}

function renderLabores() {
  const filtradas = applyFilters();
  if (filtradas.length===0) return '<div class="empty">No hay labores que coincidan con los filtros.</div>';
  const enProceso = filtradas.filter(r=>String(r["Estado Operativo"]||"").trim()==="En Proceso");
  const pendientes = filtradas.filter(r=>String(r["Estado Operativo"]||"").trim()==="Pendiente");

  const seccion = (lista, tipo) => {
    if (lista.length===0) return "";
    const isProc = tipo==="En Proceso";
    const grupos = {};
    lista.forEach(r=>{ const cc=String(r["Centro_Costo"]||"").trim(); if(!grupos[cc]) grupos[cc]=[]; grupos[cc].push(r); });
    const cards = Object.entries(grupos).map(([ccId, labs])=>{
      const ccNombre = CC_MAP[ccId]||ccId;
      const fundo    = FUNDO_MAP[ccId]||"";
      const sorted   = [...labs].sort((a,b)=>(parseDate(a["Fecha"])||0)-(parseDate(b["Fecha"])||0));
      const filas    = sorted.map(r=>{
        const st=dateStatus(r["Fecha"]), c=C[st];
        const laborNombre = LAB_MAP[String(r["Labor"]||"").trim()]||String(r["Labor"]||"—").trim();
        const encNombre   = ENC_MAP[String(r["Encargado"]||"").trim()]||String(r["Encargado"]||"").trim();
        const obs  = String(r["Observaciones"]||"").trim();
        const tipo = String(r["Tipo_Labor"]||"").trim();
        return `<div class="labor">
          <div class="labor-bar" style="background:${c.bar};"></div>
          <div class="labor-inner">
            <div class="labor-date" style="color:${c.date};">${fmtDate(r["Fecha"])}</div>
            <div style="flex:1;">
              <div class="labor-name">${laborNombre}</div>
              ${obs?`<div class="labor-obs">${obs}</div>`:""}
              <div class="labor-meta">
                ${encNombre?`<span>👤 ${encNombre}</span>`:""}
                ${tipo?`<span>🏷 ${tipo}</span>`:""}
              </div>
            </div>
          </div>
        </div>`;
      }).join("");
      return `<div class="card">
        <div class="card-hd ${isProc?"proc":"pend"}">
          <div><div class="card-hd-name">${ccNombre}</div><div class="card-hd-sub">${fundo}</div></div>
          <span class="badge ${isProc?"proc":"pend"}">${isProc?"En proceso":"Pendiente"}</span>
        </div>${filas}</div>`;
    }).join("");
    return `<div class="sec-head">
      <div class="sec-icon ${isProc?"proc":"pend"}">${isProc?"↻":"○"}</div>
      <div class="sec-title">${tipo}</div>
      <div class="sec-count">${lista.length} labores</div>
    </div>${cards}`;
  };
  return seccion(enProceso,"En Proceso") + seccion(pendientes,"Pendiente");
}

function renderPageLabores() {
  document.getElementById("app-labores").innerHTML =
    renderStats() + renderFilters() + renderLabores() +
    `<div class="footer">Reporte automático · Los Crisoles · BData</div>`;
}

// ── RENDER COSTOS ──────────────────────────────────────────────────────────
function renderCostos() {
  // Build filter options
  const todosConCosto = TODOS.filter(r => Number(r["Costo Total"]) > 0);
  const ccOpts   = [...new Set(todosConCosto.map(r => String(r["Centro_Costo"]||"").trim()).filter(Boolean))].sort();
  const fundoOpts = [...new Set(ccOpts.map(id => FUNDO_MAP[id]||"").filter(Boolean))].sort();

  const ccBtns    = ccOpts.map(id => `<button class="fbtn${stateCostos.cc===id?" on":""}" onclick="setCostoFilter('cc','${id}')">${CC_MAP[id]||id}</button>`).join("");
  const fundoBtns = fundoOpts.map(f => `<button class="fbtn${stateCostos.fundo===f?" on":""}" onclick="setCostoFilter('fundo','${f}')">${f}</button>`).join("");

  // Año y mes options
  const anioOpts = [...new Set(todosConCosto.map(r => {
    const d = parseDate(r["Fecha"]); return d ? d.getFullYear() : null;
  }).filter(Boolean))].sort();
  const mesOpts = [...new Set(todosConCosto.map(r => {
    const d = parseDate(r["Fecha"]); return d ? String(d.getMonth()+1).padStart(2,"0") : null;
  }).filter(Boolean))].sort();
  const MESES = {"01":"Ene","02":"Feb","03":"Mar","04":"Abr","05":"May","06":"Jun","07":"Jul","08":"Ago","09":"Sep","10":"Oct","11":"Nov","12":"Dic"};

  const anioBtns = anioOpts.map(a => `<button class="fbtn${stateCostos.anio===String(a)?" on":""}" onclick="setCostoFilter('anio','${a}')">${a}</button>`).join("");
  const mesBtns  = mesOpts.map(m  => `<button class="fbtn${stateCostos.mes===m?" on":""}" onclick="setCostoFilter('mes','${m}')">${MESES[m]||m}</button>`).join("");

  const filtrosHTML = `<div class="filters-wrap" style="margin-bottom:12px;">
    <div class="filters-row">
      <div class="filter-label">Año</div>
      <button class="fbtn${stateCostos.anio==="todos"?" on":""}" onclick="setCostoFilter('anio','todos')">Todos</button>
      ${anioBtns}
    </div>
    <div class="filters-row">
      <div class="filter-label">Mes</div>
      <button class="fbtn${stateCostos.mes==="todos"?" on":""}" onclick="setCostoFilter('mes','todos')">Todos</button>
      ${mesBtns}
    </div>
    <div class="filters-row">
      <div class="filter-label">Unidad prod.</div>
      <button class="fbtn${stateCostos.cc==="todas"?" on":""}" onclick="setCostoFilter('cc','todas')">Todas</button>
      ${ccBtns}
    </div>
    <div class="filters-row">
      <div class="filter-label">Centro costo</div>
      <button class="fbtn${stateCostos.fundo==="todos"?" on":""}" onclick="setCostoFilter('fundo','todos')">Todos</button>
      ${fundoBtns}
    </div>
  </div>`;

  const conCosto = todosConCosto.filter(r => {
    const ccId  = String(r["Centro_Costo"]||"").trim();
    const fundo = FUNDO_MAP[ccId]||"";
    const d     = parseDate(r["Fecha"]);
    const anio  = d ? String(d.getFullYear()) : "";
    const mes   = d ? String(d.getMonth()+1).padStart(2,"0") : "";
    if (stateCostos.cc    !== "todas"  && ccId  !== stateCostos.cc)    return false;
    if (stateCostos.fundo !== "todos"  && fundo !== stateCostos.fundo) return false;
    if (stateCostos.anio  !== "todos"  && anio  !== stateCostos.anio)  return false;
    if (stateCostos.mes   !== "todos"  && mes   !== stateCostos.mes)   return false;
    return true;
  });

  const totalGeneral = conCosto.reduce((s,r) => s + Number(r["Costo Total"]), 0);
  const totalRegistros = conCosto.length;

  // Por UP
  const upCostosMap = {};
  conCosto.forEach(r => {
    const ccId   = String(r["Centro_Costo"]||"").trim();
    const nombre = CC_MAP[ccId] || ccId;
    if (!upCostosMap[ccId]) upCostosMap[ccId] = { nombre, fundo: FUNDO_MAP[ccId]||"", ha: HA_MAP[ccId]||0, total: 0 };
    upCostosMap[ccId].total += Number(r["Costo Total"]);
  });
  const upCostos = Object.values(upCostosMap).sort((a,b) => b.total - a.total);

  // Por tipo labor
  const tipoCostos = sumBy(conCosto,
    r => String(r["Tipo_Labor"]||"—").trim(),
    r => Number(r["Costo Total"])
  );
  const tipoMax = tipoCostos[0]?.[1] || 1;
  const tipoHTML = tipoCostos.map(([k,v]) => bar(k, v, tipoMax, "#0f6e56", fmtPeso)).join("");

  // Por mes
  const mesCostos = sumBy(conCosto,
    r => {
      const d = parseDate(r["Fecha"]);
      if (!d) return "Sin fecha";
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    },
    r => Number(r["Costo Total"])
  ).sort((a,b) => a[0].localeCompare(b[0]));
  const mesMax = mesCostos.reduce((m,[,v]) => Math.max(m,v), 0);
  // Acumulado por mes
  let acum = 0;
  const mesConAcum = mesCostos.map(([k,v]) => { acum += v; return [k, v, acum]; });
  const acumMax = acum;

  const mesHTML = mesConAcum.map(([k, v, a]) => {
    const pctMes  = mesMax  > 0 ? Math.round(v/mesMax*100)  : 0;
    const pctAcum = acumMax > 0 ? Math.round(a/acumMax*100) : 0;
    const label = k.length === 7
      ? new Date(k+"-15").toLocaleDateString("es-CL",{month:"short",year:"numeric"})
      : k;
    return `<div class="mes-row">
      <div class="mes-label">${label}</div>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <div style="font-size:10px;color:#888;width:60px;flex-shrink:0;">Mensual</div>
          <div class="mes-bar-wrap"><div class="mes-bar-fill" style="width:${pctMes}%;background:#1a3a0a;"></div></div>
          <div class="mes-val">${fmtPeso(v)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="font-size:10px;color:#888;width:60px;flex-shrink:0;">Acumulado</div>
          <div class="mes-bar-wrap"><div class="mes-bar-fill" style="width:${pctAcum}%;background:#0f6e56;"></div></div>
          <div class="mes-val" style="color:#0f6e56;">${fmtPeso(a)}</div>
        </div>
      </div>
    </div>`;
  }).join("");

  // Tabla por UP
  const upTabla = upCostos.map((item, i) => {
    const pct    = totalGeneral > 0 ? (item.total/totalGeneral*100).toFixed(1) : 0;
    const costoHa = item.ha > 0 ? item.total / item.ha : 0;
    return `<tr>
      <td style="font-weight:bold;">${i+1}</td>
      <td>${item.nombre}</td>
      <td style="color:#888;">${item.fundo}</td>
      <td style="text-align:right;color:#888;">${item.ha > 0 ? item.ha : "—"}</td>
      <td style="text-align:right;font-weight:bold;color:#1a3a0a;">${fmtPeso(item.total)}</td>
      <td style="text-align:right;color:#0f6e56;">${item.ha > 0 ? fmtPeso(costoHa) : "—"}</td>
      <td style="text-align:right;color:#888;">${pct}%</td>
    </tr>`;
  }).join("");

  const promedio = totalRegistros > 0 ? totalGeneral / totalRegistros : 0;

  document.getElementById("app-costos").innerHTML = `

    ${filtrosHTML}
    <div class="stat-card" style="margin-bottom:12px;">
      <div class="stat-title">Costo por unidad productiva</div>
      <table class="up-table">
        <thead><tr><th>#</th><th>Unidad Productiva</th><th>Centro de Costos</th><th style="text-align:right;">Hás</th><th style="text-align:right;">Total</th><th style="text-align:right;">$/Há</th><th style="text-align:right;">%</th></tr></thead>
        <tbody>${upTabla || "<tr><td colspan='7' style='color:#aaa;text-align:center;'>Sin datos</td></tr>"}</tbody>
      </table>
    </div>

    <div class="stat-card">
      <div class="stat-title">Evolución mensual de costos</div>
      ${mesHTML || "<div style='font-size:12px;color:#aaa;'>Sin datos suficientes</div>"}
    </div>

    <div class="footer">Costos basados en campo "Costo Total" · Los Crisoles · BData</div>`;
}

function setCostoFilter(key, val) {
  stateCostos[key] = val;
  renderCostos();
}

function setFilter(key, val) {
  state[key] = val;
  if (key==="estado") state.soloVencidas = false;
  renderPageLabores();
}
function toggleVencidas() {
  state.soloVencidas = !state.soloVencidas;
  renderPageLabores();
}

// ── MAIN ───────────────────────────────────────────────────────────────────
async function main() {
  try {
    const [registros, ccs, labores, encargados] = await Promise.all([
      fetchSheet(API_REGISTRO, "BD_Registro"),
      fetchSheet(API_CC,       "BD_CC"),
      fetchSheet(API_LABORES,  "BD_Labores"),
      fetchSheet(API_REGISTRO, "Encargados")
    ]);

    ccs.forEach(c => {
      const id = String(c["Id_CC"]||"").trim();
      if (id) {
        CC_MAP[id]    = String(c["NOMBRE CC"]||id).trim();
        FUNDO_MAP[id] = String(c["FUNDO"]||"").trim();
        HA_MAP[id]    = parseFloat(c["HECTÁREAS"]||c["HECTAREAS"]||0) || 0;
      }
    });
    labores.forEach(l => {
      const id = String(l["Id_Labor"]||"").trim();
      if (id) LAB_MAP[id] = String(l["Nombre Labor"]||l["Labor"]||id).trim();
    });
    encargados.forEach(e => {
      const id = String(e["id_Encargado"]||"").trim();
      if (id) ENC_MAP[id] = String(e["Nombre Encargado"]||id).trim();
    });

    TODOS   = registros;
    ACTIVOS = registros.filter(r => {
      const est = String(r["Estado Operativo"]||"").trim();
      return est==="En Proceso" || est==="Pendiente";
    });

    const total = ACTIVOS.length;
    const venc  = ACTIVOS.filter(r=>dateStatus(r["Fecha"])==="venc").length;
    const hoy   = ACTIVOS.filter(r=>dateStatus(r["Fecha"])==="hoy").length;
    const prox  = ACTIVOS.filter(r=>dateStatus(r["Fecha"])==="prox").length;
    document.getElementById("m-total").textContent = total;
    document.getElementById("m-venc").textContent  = venc;
    document.getElementById("m-hoy").textContent   = hoy;
    document.getElementById("m-prox").textContent  = prox;

    // Costos header metrics
    const totalCosto = TODOS.reduce((s,r) => s + Number(r["Costo Total"]||0), 0);
    const totalHa    = Object.values(HA_MAP).reduce((s,v) => s + v, 0);
    const costoHa    = totalHa > 0 ? totalCosto / totalHa : 0;
    document.getElementById("m-costo-total").textContent = fmtPeso(totalCosto);
    document.getElementById("m-costo-ha").textContent    = fmtPeso(costoHa);

    const now = new Date();
    document.getElementById("hdr-date").textContent = now.toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    document.getElementById("hdr-refresh").innerHTML = `Actualizado<br>${now.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}`;

    renderPageLabores();
    renderCostos();

  } catch(e) {
    document.getElementById("app-labores").innerHTML =
      `<div class="err"><strong>No se pudieron cargar los datos</strong><br><br>${e.message}</div>`;
  }
}

main();
</script>
</body>
</html>
