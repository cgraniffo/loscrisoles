<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BData Intelligence</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{

padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>BDATA Intelligence</h1>

<div class="card">
<h2>Portal Analítico Agrícola</h2>
<p>Este es el primer MVP del sistema de análisis económico de cultivos.</p>
</div>

<div class="grid">

<div class="card">
<h3>Cliente</h3>
<p>Agrícola Los Crisoles</p>
</div>

<div class="card">
<h3>Estado</h3>
<p>Sistema en desarrollo</p>
</div>

<div class="card">
<h3>Ambiente</h3>
<p>MVP</p>
</div>

</div>

</div>

</body>
</html>
