<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Rentabilidad - BData</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .dashboard-card { border-top: 5px solid #28a745; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .highlight { color: #28a745; font-weight: bold; }
        .alert-card { border-top: 5px solid #dc3545; }
        #loader { display: none; margin: 40px auto; text-align: center; }
        .spinner-border { width: 3rem; height: 3rem; color: #28a745; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold">Inteligencia Agrícola <span class="text-success">BData</span></h1>
        <p class="lead">Análisis Ejecutivo de Rentabilidad por Centro de Costo</p>
    </div>

    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" id="clienteInput" class="form-control form-control-lg" placeholder="Ingrese ID del Cliente (Ej: LOS CRISOLES)">
                <button class="btn btn-success btn-lg" onclick="cargarReporte()">Generar Reporte IA</button>
            </div>
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border" role="status"></div>
        <h4 class="mt-3 text-muted">La IA está analizando su portafolio...</h4>
    </div>

    <div id="resultados" style="display: none;">
        
        <div class="card dashboard-card p-4 mb-4 bg-white">
            <h2 id="nombreEmpresa" class="mb-3"></h2>
            <h5 class="text-muted mb-4">Temporada: <span id="temporadaTxt"></span></h5>
            
            <h4>Resumen Ejecutivo</h4>
            <p id="resumenEjecutivo" class="fs-5"></p>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card dashboard-card p-4 h-100 bg-white">
                    <h4 class="text-success">🌟 Cultivo Destacado</h4>
                    <p id="cultivoDestacado" class="display-6 fw-bold mb-0"></p>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card alert-card p-4 h-100 bg-white">
                    <h4 class="text-danger">⚠️ Cultivo en Alerta</h4>
                    <p id="cultivoAlerta" class="display-6 fw-bold mb-0"></p>
                </div>
            </div>
        </div>

        <div class="card p-4 mb-4 bg-white shadow-sm border-0">
            <h4>📊 Hallazgos Clave</h4>
            <ul id="listaHallazgos" class="list-group list-group-flush fs-5 mt-3"></ul>
        </div>

        <div class="card p-4 bg-white shadow-sm border-0">
            <h4>🎯 Recomendaciones Estratégicas</h4>
            <ul id="listaRecomendaciones" class="list-group list-group-flush fs-5 mt-3"></ul>
        </div>

    </div>
</div>

<script>
    function cargarReporte() {
        const cliente = document.getElementById('clienteInput').value.trim();
        if(!cliente) return alert('Por favor ingrese el nombre del cliente');

        document.getElementById('resultados').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        // LLAMADA A TU PYTHONANYWHERE
        const urlAPI = `https://cgraniffo.pythonanywhere.com/api/conclusion-web/${encodeURIComponent(cliente)}`;

        fetch(urlAPI)
            .then(response => response.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                
                if(data.status === 'error') {
                    alert('Error: ' + data.mensaje);
                    return;
                }

                // Llenar datos
                document.getElementById('nombreEmpresa').textContent = data.empresa;
                document.getElementById('temporadaTxt').textContent = data.temporada;
                document.getElementById('resumenEjecutivo').textContent = data.conclusion.resumen_ejecutivo;
                document.getElementById('cultivoDestacado').textContent = data.conclusion.cultivo_destacado || 'N/A';
                document.getElementById('cultivoAlerta').textContent = data.conclusion.cultivo_alerta || 'N/A';

                // Llenar listas
                const ulHallazgos = document.getElementById('listaHallazgos');
                ulHallazgos.innerHTML = '';
                data.conclusion.hallazgos.forEach(h => {
                    ulHallazgos.innerHTML += `<li class="list-group-item px-0 py-3">🔹 ${h}</li>`;
                });

                const ulRecomendaciones = document.getElementById('listaRecomendaciones');
                ulRecomendaciones.innerHTML = '';
                data.conclusion.recomendaciones.forEach(r => {
                    ulRecomendaciones.innerHTML += `<li class="list-group-item px-0 py-3">✅ ${r}</li>`;
                });

                document.getElementById('resultados').style.display = 'block';
            })
            .catch(error => {
                document.getElementById('loader').style.display = 'none';
                alert('Error de conexión con el servidor IA.');
                console.error(error);
            });
    }
</script>

</body>
</html>
