<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Los Crisoles · Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a3a0a; display: flex; flex-direction: column; height: 100vh; }
    .tabbar {
      display: flex; overflow-x: auto; white-space: nowrap;
      background: #1a3a0a; border-bottom: 2px solid rgba(134,239,172,0.25);
      flex-shrink: 0; -webkit-overflow-scrolling: touch;
    }
    .tab {
      font-size: 12px; font-weight: 600; padding: 12px 18px;
      cursor: pointer; color: rgba(255,255,255,0.55);
      border-bottom: 3px solid transparent; flex-shrink: 0;
      transition: all 0.15s; user-select: none;
    }
    .tab:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .tab.active { color: #fff; border-bottom-color: #86efac; }
    .frame-wrap { flex: 1; position: relative; }
    iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none; display: none;
      background: #f5f0e8;
    }
    iframe.active { display: block; }
    @media (max-width: 600px) { .tab { font-size: 10px; padding: 10px 12px; } }
  </style>
</head>
<body>

<div class="tabbar">
  <div class="tab active" onclick="show('home', this)">🏠 Resumen</div>
  <div class="tab"        onclick="show('labores', this)">📋 Labores</div>
  <div class="tab"        onclick="show('caja', this)">🏦 Caja</div>
  <div class="tab"        onclick="show('costos', this)">💰 Costos</div>
  <div class="tab"        onclick="show('insumos', this)">📦 Insumos</div>
  <div class="tab"        onclick="show('produccion', this)">🌱 Producción</div>
  <div class="tab"        onclick="show('ingresos', this)">🌾 Ingresos</div>
  <div class="tab"        onclick="show('margenes', this)">📊 Márgenes</div>
  <div class="tab"        onclick="show('asignar', this)">📎 Asignar</div>
  <div class="tab"        onclick="show('campo', this)">🗺 Campo</div>
</div>

<div class="frame-wrap">
  <!-- src vacío en todos excepto home. Se carga al primer click. -->
  <iframe id="f-home"       class="active" src="home.html"></iframe>
  <iframe id="f-labores"    data-src="reporte.html#labores"></iframe>
  <iframe id="f-caja"       data-src="reporte.html#caja"></iframe>
  <iframe id="f-costos"     data-src="reporte.html#costos"></iframe>
  <iframe id="f-insumos"    data-src="produccion.html#insumos"></iframe>
  <iframe id="f-produccion" data-src="produccion.html#produccion"></iframe>
  <iframe id="f-ingresos"   data-src="reporte.html#ingresos"></iframe>
  <iframe id="f-margenes"   data-src="reporte.html#margenes"></iframe>
  <iframe id="f-asignar"    data-src="asignar.html"></iframe>
  <iframe id="f-campo"      data-src="home.html#campo"></iframe>
</div>

<script>
  var loaded = { home: true };

  function show(name, el) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    document.querySelectorAll('iframe').forEach(function(f) { f.classList.remove('active'); });
    var frame = document.getElementById('f-' + name);
    if (!loaded[name]) {
      frame.src = frame.getAttribute('data-src');
      loaded[name] = true;
    }
    frame.classList.add('active');
  }
</script>

</body>
</html>
